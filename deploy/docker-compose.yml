# RepWire — Docker Compose for a single VPS.
#
# The `web` (Next.js) service is intentionally omitted: the frontend is built
# later. Add it under this file once apps/web exists (see README).
#
# Usage:
#   cp .env.example .env   # then fill in secrets
#   docker compose -f deploy/docker-compose.yml --env-file .env up -d --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-repwire}
      POSTGRES_USER: ${POSTGRES_USER:-repwire}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-repwire}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-repwire}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Runs SQL migrations then exits. api/worker wait for it to complete.
  migrate:
    image: migrate/migrate:v4.17.1
    volumes:
      - ../migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=${DATABASE_URL:-postgres://${POSTGRES_USER:-repwire}:${DB_PASSWORD:-repwire}@postgres:5432/${POSTGRES_DB:-repwire}?sslmode=disable}"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-repwire}:${DB_PASSWORD:-repwire}@postgres:5432/${POSTGRES_DB:-repwire}?sslmode=disable}
      SESSION_SECRET: ${SESSION_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-RepWireBot}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-repwire}:${DB_PASSWORD:-repwire}@postgres:5432/${POSTGRES_DB:-repwire}?sslmode=disable}
      SESSION_SECRET: ${SESSION_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-RepWireBot}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.anthropic.com/v1/messages}
      LLM_MODEL: ${LLM_MODEL:-claude-haiku-4-5-20251001}
      LLM_DAILY_BUDGET_USD: ${LLM_DAILY_BUDGET_USD:-5}
      LLM_SCORE_THRESHOLD: ${LLM_SCORE_THRESHOLD:-25}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-8}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # Reverse proxy / TLS. Enable once you have a domain + the web service.
  # caddy:
  #   image: caddy:2-alpine
  #   ports: ["80:80", "443:443"]
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile
  #     - caddydata:/data
  #   depends_on: [api]
  #   restart: unless-stopped

volumes:
  pgdata: {}
  caddydata: {}
