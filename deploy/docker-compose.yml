# RepWire — Docker Compose for a single VPS.
#
# Usage:
#   cp .env.example .env   # then fill in secrets
#   docker compose -f deploy/docker-compose.yml --env-file .env up -d --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-repwire}
      POSTGRES_USER: ${POSTGRES_USER:-repwire}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-repwire}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-repwire}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Runs SQL migrations then exits. api/worker wait for it to complete.
  migrate:
    image: migrate/migrate:v4.17.1
    volumes:
      - ../migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=${DATABASE_URL:-postgres://${POSTGRES_USER:-repwire}:${DB_PASSWORD:-repwire}@postgres:5432/${POSTGRES_DB:-repwire}?sslmode=disable}"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-repwire}:${DB_PASSWORD:-repwire}@postgres:5432/${POSTGRES_DB:-repwire}?sslmode=disable}
      SESSION_SECRET: ${SESSION_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      MEDIA_STORAGE_DIR: /var/lib/baothex/media
      MEDIA_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-RepWireBot}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SEPAY_MERCHANT: ${SEPAY_MERCHANT:-}
      SEPAY_SECRET_KEY: ${SEPAY_SECRET_KEY:-}
      SEPAY_BASE_URL: ${SEPAY_BASE_URL:-https://pay.sepay.vn}
      SEPAY_IPN_SECRET_KEY: ${SEPAY_IPN_SECRET_KEY:-}
      WEB_PUSH_PUBLIC_KEY: ${WEB_PUSH_PUBLIC_KEY:-}
      WEB_PUSH_PRIVATE_KEY: ${WEB_PUSH_PRIVATE_KEY:-}
      WEB_PUSH_SUBJECT: ${WEB_PUSH_SUBJECT:-mailto:admin@example.com}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      - media:/var/lib/baothex/media
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-repwire}:${DB_PASSWORD:-repwire}@postgres:5432/${POSTGRES_DB:-repwire}?sslmode=disable}
      SESSION_SECRET: ${SESSION_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      MEDIA_STORAGE_DIR: /var/lib/baothex/media
      MEDIA_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-RepWireBot}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.anthropic.com/v1/messages}
      LLM_MODEL: ${LLM_MODEL:-claude-haiku-4-5-20251001}
      LLM_DAILY_BUDGET_USD: ${LLM_DAILY_BUDGET_USD:-5}
      LLM_SCORE_THRESHOLD: ${LLM_SCORE_THRESHOLD:-25}
      LLM_MAX_CALLS_PER_HOUR: ${LLM_MAX_CALLS_PER_HOUR:-120}
      TTS_API_KEY: ${TTS_API_KEY:-}
      TTS_MODEL: ${TTS_MODEL:-gemini-2.5-flash-preview-tts}
      TTS_VOICE: ${TTS_VOICE:-Erinome}
      TELEGRAM_POLLING: "false"
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-8}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    volumes:
      - media:/var/lib/baothex/media

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
    depends_on:
      - api
    expose:
      - "3000"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on: [api, web]
    restart: unless-stopped

volumes:
  pgdata: {}
  caddydata: {}
  caddyconfig: {}
  media: {}
