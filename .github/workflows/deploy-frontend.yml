name: Deploy frontend

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-frontend
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy Cloudflare Worker
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production
      url: https://baothex-web.universeapd.workers.dev
    defaults:
      run:
        working-directory: apps/web
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Validate deployment configuration
        shell: bash
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID secret" && exit 1)
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN secret" && exit 1)
          test -n "$NEXT_PUBLIC_API_URL" || (echo "Missing NEXT_PUBLIC_API_URL variable" && exit 1)
          test -n "$NEXT_PUBLIC_SITE_URL" || (echo "Missing NEXT_PUBLIC_SITE_URL variable" && exit 1)

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Type-check
        run: npm run typecheck

      - name: Build Cloudflare bundle
        run: npm run build:cloudflare

      - name: Deploy production Worker
        run: npm run cf:deploy
